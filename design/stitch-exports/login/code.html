<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .pedra-clara-gradient {
            background: radial-gradient(circle at 50% 50%, #faf9f7 0%, #f4f4f1 100%);
        }
        .warm-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 165, 53, 0.08) 0%, rgba(250, 249, 247, 0) 70%);
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface flex items-center justify-center min-h-screen overflow-hidden pedra-clara-gradient">
<!-- Subtle background glow for "Pedra Clara" feel -->
<div class="warm-glow"></div>
<main class="relative z-10 w-full max-w-[480px] px-6">
<!-- Logo Area -->
<div class="flex flex-col items-center mb-12">
<div class="mb-4">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="token" style="font-variation-settings: 'FILL' 1;">token</span>
</div>
<h1 class="font-headline font-extrabold text-3xl tracking-tighter text-on-surface">Olympus</h1>
<p class="text-on-surface-variant text-sm font-medium tracking-tight mt-1">Enterprise SaaS Platform</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-10 shadow-[0_8px_24px_rgba(47,51,49,0.04)] border border-white/40">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold font-headline text-on-surface" for="email">Email</label>
<input class="w-full h-12 px-4 bg-surface-container-high border-none rounded-xl focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface placeholder:text-outline/60" id="email" name="email" placeholder="nome@empresa.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-semibold font-headline text-on-surface" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:opacity-70 transition-opacity" href="#">Esqueceu a senha?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-high border-none rounded-xl focus:ring-1 focus:ring-primary/30 focus:bg-surface-container-lowest transition-all duration-200 outline-none text-on-surface placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-2">
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-headline font-bold rounded-xl shadow-lg shadow-primary/10 hover:opacity-95 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                        Acessar Painel
                        <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Social/Other Login Divider -->
<div class="mt-8 flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] font-bold tracking-widest text-outline uppercase">Ou continue com</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Single Sign On Option -->
<button class="mt-6 w-full h-12 flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant/10 rounded-xl hover:bg-surface-container-high transition-colors duration-200 text-sm font-semibold text-on-surface">
<img alt="Google logo" class="w-5 h-5" data-alt="Official Google G-Suite logo icon for enterprise single sign-on integration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfgfKY026Ng5dxhpB0sVFWcQ8J35RYgTho3QyM4TJJG-Q7G3hM1dfnlo7uS3Kz2MnrkTI_RZi0R7D7kKdSEKvB7VUvZxqexV38R-SWIFbsqSBIuoTMKmDBWSYL2tmmELvmWvhCpKaIIWGlvxlrea8eS1dgaTQgrfK7AgotLb291ahm29HGGAe5fVTo92NrxMTwRc3kO_bkNAvEgbNfM0efIVGd2Xu5NWNTTCh2lpeZInDfPOWtACzOtpQbKZL_DHzkCeG4UUCpG2QN"/>
                SSO Corporativo
            </button>
</div>
<!-- Footer Links -->
<footer class="mt-8 text-center space-y-4">
<p class="text-on-surface-variant text-sm">
                Novo na Olympus? 
                <a class="text-primary font-bold hover:underline" href="#">Falar com a equipe</a>
</p>
<div class="flex justify-center gap-6 pt-4">
<a class="text-[11px] font-medium text-outline hover:text-on-surface transition-colors" href="#">Privacidade</a>
<a class="text-[11px] font-medium text-outline hover:text-on-surface transition-colors" href="#">Termos</a>
<a class="text-[11px] font-medium text-outline hover:text-on-surface transition-colors" href="#">Segurança</a>
</div>
</footer>
</main>
<!-- Decorative Elements for "High-End Editorial" feel -->
<div class="fixed top-0 left-0 w-full p-12 hidden lg:flex justify-between items-start pointer-events-none opacity-20">
<div class="text-[10px] font-headline font-bold tracking-[0.4em] uppercase text-on-surface vertical-text" style="writing-mode: vertical-rl;">
            EST. MMXXIV
        </div>
<div class="text-[10px] font-headline font-bold tracking-[0.4em] uppercase text-on-surface">
            Secure Terminal Access 01
        </div>
</div>
<!-- Map/Location aesthetic element (purely decorative/brand) -->
<div class="fixed bottom-12 right-12 hidden lg:block opacity-10">
<div class="w-48 h-48 rounded-full overflow-hidden bg-surface-container-high">
<img alt="Topographic map" class="w-full h-full object-cover grayscale" data-alt="Abstract minimalist topographic map pattern with subtle beige and stone gray contours" data-location="Stockholm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCYpidYC__kT1_rvAKC5H26K06OxHP5TIMD1_Xridjxkm0so3c_UCPvAs8q9_flEyBi4-KPBSU-Ey13i_PzSeonJoF-7cOWJnPAoBeI3FAeaomB-xaHELXoWumjZp3PBRdFlgCNKrsLnkhtYRawGYCPVn1a8F7Xh4ccuqeCnhepn8jqMeYEeB-4FZTGn28hHxlc4fDDkKS2y9gB2EcTPPVWgTu-GPxwfd7E7jpUkZhB1-vh-htc5r6JZtjJ8WPr0NwMr14C2rkh2Ai"/>
</div>
</div>
</body></html>
